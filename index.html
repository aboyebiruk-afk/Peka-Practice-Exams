<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peka Online Tutorial Official Webpage</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #d7ccc8; /* Soft beige background */
            color: #333;
        }

        /* Main Header Box */
        .main-header {
            background-color: #1a237e;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 2.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Flex Container for Image and Buttons */
        .content-wrapper {
            display: flex;
            flex-wrap: wrap; /* Stacks items on mobile */
            gap: 30px;
            justify-content: center;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-side { flex: 1; min-width:300px;  }
        .image-side img { width: 105%; border-radius: 18px; }

        .button-side { 
            flex: 1; 
            min-width: 300px; 
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2x2 grid */
            gap: 20px;
        }

        /* Call to Action Text */
        .cta-text {
            font-weight: bold;
            color: #5c6bc0;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* Buttons */
        .but {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }
        .but:hover { transform: scale(1.05); }

        .register { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #fff; }
        .exam { background: linear-gradient(135deg, #d3a3c9, #eb9d9d); color: #4a148c; }
        .about { background: #004d40; color: white; }
        .nots { background: linear-gradient(135deg, #fb8c00, #ffcc80); color: #5d4037; }

        /* Footer Banner */
        .footer-banner {
            margin-top: 40px;
            background: #00bcd4;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 50px;
            font-size: 2.5rem;
            border: 3px solid #00acc1;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .button-side { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="main-header">WELCOME TO PEKA ONLINE TUTORIAL WEBPAGE</div>

    <div class="content-wrapper">
        <div class="image-side">
            <img src="img4.jpeg" alt="Student studying">
        </div>

        <div class="button-side">
            <div style="grid-column: span 2;" class="cta-text">BOOST YOUR ACADEMIC STATUS WITH US.</div>
            <button onclick="window.location.href='form.html'" class="but register">Register now</button> 
            <button onclick="window.location.href='Class.html'" class="but exam">Exams</button>
            <button onclick="window.location.href='about.html'" class="but about">About us</button>
            <button onclick="window.location.href='notes.html'" class="but nots">Short Nots</button>
        </div>
    </div>

    <div class="footer-banner">
        BE A CHAMPION OF EDUCATION FOR YOUR FUTURE
    </div>

</body>
</html>
