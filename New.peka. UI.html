<!DOCTYPE html>
<html>
<head>
<title>PEKA Online Tutorial</title>

<style>

body{
    background-color:#b8a6a2;
    font-family: Arial;
}

/* Top Header */
.header{
    text-align:center;
    background:#273c9b;
    color:white;
    padding:15px;
    font-size:28px;
    border-radius:20px;
    width:70%;
    margin:auto;
}

/* Main container */
.container{
    display:flex;
    margin-top:40px;
    justify-content:center;
    gap:60px;
}

/* Left image */
.container img{
    width:500px;
    border-radius:5px;
}

/* Right section */
.right{
    text-align:center;
}

/* Title */
.right h2{
    font-size:36px;
    color:#7a3b59;
}

/* Button grid */
.buttons{
    display:grid;
    grid-template-columns:200px 200px;
    gap:40px;
    margin-top:40px;
}

/* Button style */
button{
    padding:20px;
    font-size:22px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    color:white;
}

/* Individual button colors */
.register{
    background:linear-gradient(to right,#2ecc71,#48dbfb);
}

.exams{
    background:linear-gradient(to right,#a29bfe,#fab1a0);
    color:#5a1e1e;
}

.about{
    background:linear-gradient(to right,#00cec9,#2d3436);
}

.notes{
    background:linear-gradient(to right,#e17055,#fab1a0);
    color:#5a1e1e;
}

/* Bottom banner */
.footer{
    text-align:center;
    margin-top:60px;
    padding:20px;
    font-size:28px;
    color:#aefcff;
    border-radius:20px;
    border:2px solid black;
    box-shadow:0px 0px 20px cyan;
}

</style>
</head>


<body>

<div class="header">
WELCOME TO PEKA ONLINE TUTORIAL WEBSITE
</div>


<div class="container">

<img src="img4.jpeg">

<div class="right">

<h2>BOOST YOUR ACADEMIC STATUS WITH US.</h2>

<div class="buttons">

<button class="register">Register now</button>

<button class="exams">Exams</button>

<button class="about">About us</button>

<button class="notes">Short Notes</button>

</div>

</div>

</div>


<div class="footer">
BE A CHAMPION OF EDUCATION WITH US FOR YOU FUTURE
</div>

</body>
</html>
